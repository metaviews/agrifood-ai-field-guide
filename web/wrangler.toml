name = "agrifood-ai-field-guide"
compatibility_date = "2026-07-19"

# Cloudflare unified Workers + Pages (April 2025+). Static assets are served
# from the build output directory. See:
# https://developers.cloudflare.com/workers/static-assets/binding/
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = false

# Custom domain is configured in the Cloudflare dashboard:
# Workers & Pages -> agrifood-ai-field-guide -> Settings -> Custom domains
# -> agrifood.metaviews.ca
#
# DNS for agrifood.metaviews.ca must include a CNAME record pointing to
# the project hostname. Cloudflare provisions this automatically when the
# custom domain is added via the dashboard if metaviews.ca is already on
# Cloudflare DNS.