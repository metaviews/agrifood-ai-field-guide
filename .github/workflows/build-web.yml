# Cloudflare Pages auto-deploy
#
# Build is triggered on push to main. The Cloudflare Pages GitHub app
# already handles the deploy itself once the project is connected;
# this workflow provides build verification + optional preview deployments
# on pull requests.
#
# Setup (one-time, manual):
# 1. Cloudflare dashboard -> Pages -> Create application -> Connect to Git
# 2. Select metaviews/agrifood-ai-field-guide
# 3. Set:
#    - Project name: agrifood-ai-field-guide
#    - Production branch: main
#    - Build command: npm run build
#    - Build output directory: dist
#    - Root directory: web
#    - Environment variables: none required
# 4. Pages -> Custom domains -> agrifood.metaviews.ca

name: Build web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/build-web.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/build-web.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run build
      - name: Verify build output
        run: |
          if [ ! -d "web/dist" ]; then
            echo "::error::Build did not produce a web/dist/ directory"
            exit 1
          fi
          if [ ! -d "web/dist/pagefind" ]; then
            echo "::error::Pagefind index not generated; check that pagefind ran during build"
            exit 1
          fi
          echo "Build OK. web/dist/ contains $(find web/dist -type f | wc -l) files."