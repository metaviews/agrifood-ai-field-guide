name: Build web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/build-web.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/build-web.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::Build did not produce a dist/ directory"
            exit 1
          fi
          if [ ! -d "dist/pagefind" ]; then
            echo "::error::Pagefind index not generated; check that pagefind ran during build"
            exit 1
          fi
          echo "Build OK. dist/ contains $(find dist -type f | wc -l) files."